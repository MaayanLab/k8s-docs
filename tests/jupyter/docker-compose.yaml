services:
  jupyter-lab:
    image: quay.io/jupyter/base-notebook
    pull_policy: missing
    restart: unless-stopped
    command: start-notebook.py --NotebookApp.token=''
    ports:
    - 8888:8888
    volumes:
    - jupyter-data:/home/jovyan/work

volumes:
  jupyter-data:
    x-kubernetes:
      size: 1Gi
      class: ceph-block-no-replicas

x-kubernetes:
  name: jupyter
